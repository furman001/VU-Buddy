<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VU Buddy Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="settings">
    <div class="app-shell">
        <aside class="sidebar">
            <h2 class="logo">VU Buddy</h2>
            <p class="logo-sub">Smart LMS Assistant</p>
            <nav class="nav flex-column gap-2 mt-4">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link active" href="/settings">Settings</a>
                <a class="nav-link" href="/logs">Logs</a>
            </nav>
        </aside>

        <main class="content">
            <div class="container-fluid py-4">
                <div class="hero-banner">
                    <h1 class="page-title">Bot Settings</h1>
                    <p class="page-subtitle">Configure channels and runtime behavior for a smooth automated workflow.</p>
                </div>

                <div class="settings-card mt-3">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="whatsappToggle">
                        <label class="form-check-label" for="whatsappToggle">WhatsApp Notifications</label>
                    </div>

                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="emailToggle">
                        <label class="form-check-label" for="emailToggle">Email Notifications</label>
                    </div>

                    <label for="intervalInput" class="form-label">Check Interval (minutes)</label>
                    <input id="intervalInput" type="number" min="1" class="form-control mb-3" placeholder="e.g. 5">

                    <button id="saveSettingsBtn" class="btn btn-primary btn-modern">Save Settings</button>
                    <div id="settingsMessage" class="alert alert-info mt-3 d-none" role="alert"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
