<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VU Buddy Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="logs">
    <div class="app-shell">
        <aside class="sidebar">
            <h2 class="logo">VU Buddy</h2>
            <p class="logo-sub">Smart LMS Assistant</p>
            <nav class="nav flex-column gap-2 mt-4">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/settings">Settings</a>
                <a class="nav-link active" href="/logs">Logs</a>
            </nav>
        </aside>

        <main class="content">
            <div class="container-fluid py-4">
                <div class="hero-banner">
                    <h1 class="page-title">Logs & Notifications</h1>
                    <p class="page-subtitle">Track recent activity, delivery updates, and operational history.</p>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-lg-8">
                        <div class="dashboard-card">
                            <h5>Recent Logs</h5>
                            <div id="logsList" class="logs-list mt-3"></div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="dashboard-card">
                            <h5>Last Notification</h5>
                            <p id="lastNotification" class="stat-value small-stat">None</p>
                            <h5 class="mt-4">Notifications Sent</h5>
                            <p id="logsNotificationCount" class="stat-value small-stat">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
